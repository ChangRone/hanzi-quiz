<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漢字聽寫練習 - 多字循環版</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --error-color: #ff4d4d;
            --success-color: #28a745;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            touch-action: manipulation;
            padding: 20px;
            box-sizing: border-box;
        }

        #quiz-header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 360px;
        }

        #target-hint {
            font-size: 1.1rem;
            color: #666;
        }

        #target-cloze {
            font-size: 1.9rem;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
            line-height: 1.4;
        }

        #writer-container {
            width: 320px;
            height: 320px;
            background: #ffffff;
            border: 3px solid #dee2e6;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            transition: border-color 0.2s, transform 0.1s;
        }

        #writer-container.correct {
            border-color: var(--success-color);
            transform: scale(1.02);
        }

        #writer-container.wrong {
            border-color: var(--error-color);
            transform: scale(0.98);
        }

        .controls {
            margin-top: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 320px;
            max-width: 100%;
        }

        button {
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            font-weight: bold;
            transition: 0.2s;
        }

        button.primary {
            background: var(--primary-color);
            color: white;
        }

        button:active {
            opacity: 0.7;
            transform: translateY(2px);
        }

        #msg {
            margin-top: 18px;
            min-height: 1.5em;
            font-weight: 500;
            color: #666;
            text-align: center;
            max-width: 360px;
        }

        #footer-note {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            max-width: 360px;
            line-height: 1.5;
        }

        @media (max-width: 380px) {
            #writer-container {
                width: 280px;
                height: 280px;
            }

            .controls {
                width: 280px;
            }

            #target-cloze {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div id="quiz-header">
        <div id="target-hint">請聽寫上下文缺少的字</div>
        <div id="target-cloze">載入中...</div>
    </div>

    <div id="writer-container"></div>

    <div id="msg">等待開始...</div>
    <div id="footer-note">可直接分享此 HTML 檔，在手機瀏覽器開啟即可使用。</div>

    <div class="controls">
        <button type="button" onclick="playAudio()">🔊 聽讀音</button>
        <button type="button" onclick="hintStroke()">💡 提示</button>
        <button type="button" onclick="resetCurrent()">重寫本字</button>
        <button type="button" class="primary" onclick="nextWord()">跳過 / 下一字</button>
    </div>

    <script>
        const quizList = [
            { char: '我', sentence: '「{{c}}」是一個工程師' },
            { char: '學', sentence: '他在學校「{{c}}」習' },
            { char: '習', sentence: '學「{{c}}」很有趣' },
            { char: '家', sentence: '這裡是我的「{{c}}」' }
        ];

        let currentIndex = 0;
        let writer = null;
        let autoNextTimer = null;

        function clearAutoNextTimer() {
            if (autoNextTimer) {
                clearTimeout(autoNextTimer);
                autoNextTimer = null;
            }
        }

        function setMessage(text) {
            document.getElementById('msg').innerText = text;
        }

        function setCloze(sentence) {
            document.getElementById('target-cloze').innerText =
                sentence.replace('{{c}}', '＿');
        }

        function initChar(index) {
            clearAutoNextTimer();

            const data = quizList[index];
            const container = document.getElementById('writer-container');

            setCloze(data.sentence);
            setMessage(`第 ${index + 1} / ${quizList.length} 題`);

            container.classList.remove('correct', 'wrong');
            container.innerHTML = '';

            writer = HanziWriter.create('writer-container', data.char, {
                width: container.clientWidth,
                height: container.clientHeight,
                padding: 24,
                showOutline: false,
                showCharacter: false,
                strokeColor: '#333',
                highlightColor: '#007bff',
                onLoadCharDataSuccess: function() {
                    startQuiz();
                    playAudio();
                },
                onLoadCharDataError: function(err) {
                    console.error('字形資料載入失敗:', err);
                    setMessage(`字形資料載入失敗：${data.char}`);
                }
            });
        }

        function startQuiz() {
            if (!writer) return;

            const container = document.getElementById('writer-container');

            writer.quiz({
                onStrokeCorrect: function() {
                    container.classList.remove('wrong');
                    container.classList.add('correct');
                    setTimeout(() => container.classList.remove('correct'), 180);
                },
                onMistake: function() {
                    container.classList.remove('correct');
                    container.classList.add('wrong');
                    setTimeout(() => container.classList.remove('wrong'), 180);
                },
                onComplete: function() {
                    setMessage('太棒了！2 秒後自動下一題');
                    autoNextTimer = setTimeout(nextWord, 2000);
                }
            });
        }

        function nextWord() {
            clearAutoNextTimer();
            currentIndex = (currentIndex + 1) % quizList.length;
            initChar(currentIndex);
        }

        function resetCurrent() {
            initChar(currentIndex);
        }

        function hintStroke() {
            if (!writer) return;
            writer.animateCharacter();
        }

        function playAudio() {
            const char = quizList[currentIndex].char;
            const utterance = new SpeechSynthesisUtterance(char);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        window.addEventListener('load', function() {
            initChar(0);
        });

        window.addEventListener('resize', function() {
            clearAutoNextTimer();
            initChar(currentIndex);
        });
    </script>
</body>
</html>
