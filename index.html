<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>漢字聽寫練習（class + tokens 整合版）</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #2d3436;
      --subtle: #7f8c8d;
      --border: #dcdde1;
      --primary: #ff9f43;
      --primary-dark: #f08b29;
      --hint: #54a0ff;
      --hint-soft: #edf5ff;
      --success: #2ecc71;
      --error: #e74c3c;
      --shadow: 0 10px 24px rgba(0,0,0,0.06);
      --box-size: 120px;
      --rt-size: 0.35em;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Bopomofo Ruby", "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: 20px 14px 30px;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px 16px 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .title {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff7ed;
      color: var(--primary-dark);
      border: 1px solid #fed7aa;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
      font-weight: 800;
    }

    .question-hint {
      text-align: center;
      font-size: 0.98rem;
      color: var(--subtle);
      margin-bottom: 10px;
    }

    #quiz-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 10px 8px;
      padding: 8px 0 2px;
      min-height: 180px;
    }

    ruby {
      ruby-position: over;
      ruby-align: center;
      display: inline-flex;
      flex-direction: column-reverse;
      align-items: center;
      justify-content: flex-end;
      margin: 0 1px;
    }

    rt {
      font-size: var(--rt-size);
      color: #6b7280;
      line-height: 1.1;
      margin-bottom: 4px;
      user-select: none;
      text-align: center;
    }

    .text-char {
      font-size: 2.7rem;
      line-height: 1;
      font-weight: 700;
      min-width: 1em;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .writer-box {
      position: relative;
      width: var(--box-size);
      height: var(--box-size);
      border: 4px solid var(--border);
      border-radius: 20px;
      background: white;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
      transition: all 0.25s ease;
      overflow: hidden;
      touch-action: none;
      background-image:
        linear-gradient(to bottom, transparent 49%, #f0f0f0 50%, transparent 51%),
        linear-gradient(to right, transparent 49%, #f0f0f0 50%, transparent 51%);
    }

    .writer-box.correct {
      border-color: var(--success) !important;
      background-color: #f0fff4;
      transform: scale(1.02);
    }

    .writer-box.wrong {
      border-color: var(--error) !important;
      transform: scale(0.985);
    }

    .hint-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      z-index: 10;
      border-radius: 16px;
      transition: opacity 0.45s ease;
      pointer-events: none;
    }

    #msg {
      margin-top: 18px;
      min-height: 30px;
      color: var(--subtle);
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.94rem;
      font-weight: 700;
      color: #475569;
    }

    .controls {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      margin: 0;
      padding: 13px 16px;
      font-size: 1.02rem;
      border-radius: 999px;
      border: 2px solid #bdc3c7;
      background: white;
      cursor: pointer;
      font-weight: 800;
      color: var(--text);
      transition: 0.18s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    button.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    button.hint-btn {
      background: var(--hint);
      color: white;
      border-color: var(--hint);
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: 14px;
    }

    @media (max-width: 720px) {
      :root { --box-size: 104px; }
      .text-char { font-size: 2.2rem; }
    }

    @media (max-width: 520px) {
      :root { --box-size: 92px; --rt-size: 0.42em; }
      .text-char { font-size: 1.95rem; }
      #quiz-container { gap: 8px 6px; min-height: 150px; }
      #msg { font-size: 1.02rem; }
      .controls { grid-template-columns: 1fr; max-width: 320px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="topbar">
        <div class="title">漢字聽寫練習</div>
        <div class="badge" id="progress-badge">第 1 / 1 題</div>
      </div>

      <div class="question-hint">請先聽整句，再把空格中的字寫出來</div>

      <div id="quiz-container">載入中...</div>

      <div id="msg"></div>

      <div class="stats">
        <div class="stat" id="stat-complete">完成字數：0</div>
        <div class="stat" id="stat-hint">提示次數：0</div>
        <div class="stat" id="stat-mistake">錯誤次數：0</div>
      </div>

      <div class="controls">
        <button type="button" onclick="app.playAudio()">🔊 聽全句</button>
        <button type="button" class="hint-btn" onclick="app.showHint()">💡 筆順提示</button>
        <button type="button" onclick="app.reset()">重寫</button>
        <button type="button" class="primary" onclick="app.next(true)">下一題 ➔</button>
      </div>

      <div class="footer-note">
        題庫使用 class + tokens 結構，後續較容易接 AI、JSON 題庫與個人錯題匯入。<br />
        目前使用 HanziWriter CDN，開啟時需有網路。
      </div>
    </div>
  </div>

  <script>
    const quizDatabase = [
      {
        id: "q_001",
        readText: "我是一個工程師",
        tokens: [
          { type: "blank", char: "我", zhuyin: "ㄨㄛˇ" },
          { type: "text", char: "是", zhuyin: "ㄕˋ" },
          { type: "text", char: "一", zhuyin: "ㄧˊ" },
          { type: "text", char: "個", zhuyin: "ㄍㄜˋ" },
          { type: "text", char: "工", zhuyin: "ㄍㄨㄥ" },
          { type: "text", char: "程", zhuyin: "ㄔㄥˊ" },
          { type: "text", char: "師", zhuyin: "ㄕ" }
        ]
      },
      {
        id: "q_002",
        readText: "他喜歡學習新東西",
        tokens: [
          { type: "text", char: "他", zhuyin: "ㄊㄚ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "text", char: "喜", zhuyin: "ㄒㄧˇ" },
          { type: "text", char: "歡", zhuyin: "ㄏㄨㄢ" },
          { type: "blank", char: "學", zhuyin: "ㄒㄩㄝˊ" },
          { type: "blank", char: "習", zhuyin: "ㄒㄧˊ" },
          { type: "text", char: "新", zhuyin: "ㄒㄧㄣ" },
          { type: "text", char: "東", zhuyin: "ㄉㄨㄥ" },
          { type: "text", char: "西", zhuyin: "ㄒㄧ" }
        ]
      },
      {
        id: "q_003",
        readText: "放學後要回家",
        tokens: [
          { type: "text", char: "放", zhuyin: "ㄈㄤˋ" },
          { type: "text", char: "學", zhuyin: "ㄒㄩㄝˊ" },
          { type: "text", char: "後", zhuyin: "ㄏㄡˋ" },
          { type: "text", char: "要", zhuyin: "ㄧㄠˋ" },
          { type: "blank", char: "回", zhuyin: "ㄏㄨㄟˊ" },
          { type: "blank", char: "家", zhuyin: "ㄐㄧㄚ" }
        ]
      }
    ];

    class DictationApp {
      constructor(database) {
        this.database = database;
        this.currentIndex = 0;
        this.writers = [];
        this.hintCount = 0;
        this.mistakeCount = 0;
        this.autoNextTimer = null;
        this.autoPlayOnRender = true;

        this.container = document.getElementById('quiz-container');
        this.msg = document.getElementById('msg');
        this.progressBadge = document.getElementById('progress-badge');
        this.statComplete = document.getElementById('stat-complete');
        this.statHint = document.getElementById('stat-hint');
        this.statMistake = document.getElementById('stat-mistake');

        this.renderQuestion();
      }

      clearAutoNextTimer() {
        if (this.autoNextTimer) {
          clearTimeout(this.autoNextTimer);
          this.autoNextTimer = null;
        }
      }

      updateStatusText(text) {
        this.msg.innerHTML = text;
      }

      updateStats() {
        const completedCount = this.writers.filter(w => w.completed).length;
        this.progressBadge.textContent = `第 ${this.currentIndex + 1} / ${this.database.length} 題`;
        this.statComplete.textContent = `完成字數：${completedCount}`;
        this.statHint.textContent = `提示次數：${this.hintCount}`;
        this.statMistake.textContent = `錯誤次數：${this.mistakeCount}`;
      }

      renderQuestion() {
        this.clearAutoNextTimer();

        this.writers.forEach(w => {
          try { w.instance.cancelQuiz(); } catch (e) {}
        });
        this.writers = [];
        this.hintCount = 0;
        this.mistakeCount = 0;
        this.container.innerHTML = '';

        const currentQ = this.database[this.currentIndex];
        this.updateStatusText(`加油！這是第 ${this.currentIndex + 1} 題`);

        currentQ.tokens.forEach((token, index) => {
          const rubyEl = document.createElement('ruby');
          const rtEl = document.createElement('rt');
          rtEl.innerText = token.zhuyin || '';

          if (token.type === 'text') {
            const spanEl = document.createElement('span');
            spanEl.className = 'text-char';
            spanEl.innerText = token.char;
            rubyEl.appendChild(spanEl);
            rubyEl.appendChild(rtEl);
            this.container.appendChild(rubyEl);

          } else if (token.type === 'blank') {
            const boxEl = document.createElement('div');
            boxEl.className = 'writer-box';
            boxEl.id = `writer-${currentQ.id}-${index}`;

            rubyEl.appendChild(boxEl);
            rubyEl.appendChild(rtEl);
            this.container.appendChild(rubyEl);

            this.initWriterInstance(boxEl.id, token.char);
          }
        });

        this.updateStats();

        if (this.autoPlayOnRender) {
          setTimeout(() => this.playAudio(), 220);
        }
      }

      initWriterInstance(boxId, char) {
        const boxEl = document.getElementById(boxId);
        const size = Math.round(boxEl.clientWidth);

        const writer = HanziWriter.create(boxId, char, {
          width: size,
          height: size,
          padding: Math.round(size * 0.1),
          showCharacter: false,
          showOutline: false,
          strokeColor: '#2d3436',
          highlightColor: '#ff9f43',
          drawingColor: '#2c3e50',
          drawingWidth: Math.max(14, Math.round(size * 0.16)),
          strokeAnimationSpeed: 1.5
        });

        const writerObj = { instance: writer, boxId, char, completed: false };
        this.writers.push(writerObj);

        writer.quiz({
          onComplete: () => {
            writerObj.completed = true;
            const el = document.getElementById(boxId);
            el.classList.remove('wrong');
            el.classList.add('correct');
            this.updateStats();
            this.checkWinCondition();
          },
          onMistake: () => {
            this.mistakeCount += 1;
            this.updateStats();
            const el = document.getElementById(boxId);
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 200);
          }
        });
      }

      checkWinCondition() {
        const completedCount = this.writers.filter(w => w.completed).length;
        const remain = this.writers.length - completedCount;

        if (remain > 0) {
          this.updateStatusText(`很好，再完成 ${remain} 個字`);
          return;
        }

        this.updateStatusText('<span style="color:#2ecc71">🌟 太棒了！全部寫對了！2 秒後自動下一題</span>');
        this.clearAutoNextTimer();
        this.autoNextTimer = setTimeout(() => this.next(false), 2000);
      }

      showHint() {
        const unfinished = this.writers.filter(w => !w.completed);
        if (!unfinished.length) return;

        this.hintCount += 1;
        this.updateStats();
        this.updateStatusText('已顯示筆順提示');

        unfinished.forEach(w => {
          const boxEl = document.getElementById(w.boxId);
          if (document.getElementById('overlay-' + w.boxId)) return;

          const overlay = document.createElement('div');
          overlay.id = 'overlay-' + w.boxId;
          overlay.className = 'hint-overlay';
          boxEl.appendChild(overlay);

          const tempWriter = HanziWriter.create(overlay.id, w.char, {
            width: boxEl.clientWidth,
            height: boxEl.clientHeight,
            padding: Math.round(boxEl.clientWidth * 0.1),
            showCharacter: true,
            showOutline: false,
            characterColor: 'rgba(45, 52, 54, 0.16)',
            strokeColor: '#54a0ff',
            highlightColor: '#54a0ff',
            drawingColor: '#54a0ff',
            strokeAnimationSpeed: 1.8
          });

          tempWriter.animateCharacter({
            onComplete: () => {
              setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 450);
              }, 700);
            }
          });
        });
      }

      playAudio() {
        const text = this.database[this.currentIndex].readText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      next(fromButton = true) {
        this.clearAutoNextTimer();
        this.currentIndex = (this.currentIndex + 1) % this.database.length;
        this.renderQuestion();

        if (fromButton) {
          this.updateStatusText(`已切換到第 ${this.currentIndex + 1} 題`);
        }
      }

      reset() {
        this.renderQuestion();
        this.updateStatusText(`已重寫第 ${this.currentIndex + 1} 題`);
      }
    }

    let app;
    window.onload = () => {
      app = new DictationApp(quizDatabase);
    };
  </script>
</body>
</html>
